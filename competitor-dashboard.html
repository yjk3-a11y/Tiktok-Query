<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경쟁사 콘텐츠 인텔리전스</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F7F7F5;
    --surface:#FFFFFF;
    --border:#E8E8E4;
    --text:#1A1A1A;
    --text-muted:#7A7A74;
    --text-hint:#ADADAA;
    --accent:#2F6EE8;
    --accent-bg:#EEF3FD;
    --success-bg:#EDFAF2;
    --success:#1A8C50;
    --warning-bg:#FEF8EC;
    --warning:#B07A10;
    --radius:10px;
    --radius-sm:6px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.01em}
  .header-sub{font-size:12px;color:var(--text-muted)}
  .header-right{display:flex;align-items:center;gap:8px}
  .main{max-width:1200px;margin:0 auto;padding:1.5rem 2rem}
  .filters{display:flex;gap:8px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
  select{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;outline:none}
  select:hover{border-color:#C0C0BB}
  .btn{height:32px;padding:0 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:background .15s}
  .btn:hover{background:var(--bg)}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-primary:hover{background:#2560D0}
  .summary{background:var(--accent-bg);border:1px solid #D0DFF9;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;gap:10px;align-items:flex-start}
  .summary-icon{width:18px;height:18px;flex-shrink:0;margin-top:1px;color:var(--accent)}
  .summary-content{}
  .summary-label{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.06em;margin-bottom:3px}
  .summary-text{font-size:13px;color:#1A3D8A;line-height:1.6}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
  .kpi-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
  .kpi-val{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
  .tab-row{display:flex;gap:2px;margin-bottom:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;width:fit-content}
  .tab{padding:5px 14px;border-radius:4px;font-size:13px;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .15s}
  .tab.active{background:var(--bg);color:var(--text);font-weight:500}
  .tab:hover:not(.active){color:var(--text)}
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
  .card-title{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.04em;margin-bottom:1rem}
  .brand-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer}
  .brand-row:hover .bname{color:var(--accent)}
  .bname{font-size:12px;color:var(--text);width:100px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .1s}
  .brank{font-size:10px;color:var(--text-hint);width:16px;flex-shrink:0;text-align:center}
  .bar-track{flex:1;height:16px;background:var(--bg);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .bval{font-size:11px;color:var(--text-muted);width:48px;flex-shrink:0;text-align:right}
  .country-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
  .country-title{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.04em}
  .signals{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.875rem}
  .signal{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--accent-bg);color:var(--accent);border:1px solid #D0DFF9;font-weight:500}
  .country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
  .ccard{background:var(--bg);border-radius:var(--radius-sm);padding:.75rem;border:1px solid transparent;transition:border-color .15s}
  .ccard:hover{border-color:var(--border)}
  .ccard-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:1px}
  .ccard-views{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.01em;margin:.25rem 0}
  .ccard-meta{font-size:11px;color:var(--text-muted)}
  .badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;margin-top:5px}
  .badge-high{background:var(--success-bg);color:var(--success)}
  .badge-mid{background:var(--warning-bg);color:var(--warning)}
  .badge-low{background:var(--bg);color:var(--text-hint);border:1px solid var(--border)}
  .bar-mini{height:3px;border-radius:2px;background:var(--border);margin-top:6px}
  .bar-mini-fill{height:100%;border-radius:2px;background:var(--accent)}
  .trend-wrap{position:relative;width:100%;height:220px}
  #last-updated{font-size:11px;color:var(--text-hint)}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:700px){
    .main{padding:1rem}
    .chart-row{grid-template-columns:1fr}
    .kpi-row{grid-template-columns:repeat(3,1fr)}
    .header{padding:0 1rem}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">경쟁사 인텔리전스</div>
    <div class="header-sub" id="last-updated">—</div>
  </div>
  <div class="header-right">
    <select id="brand-sel" style="min-width:130px"></select>
    <select id="date-sel" style="min-width:110px"></select>
    <button class="btn btn-primary" id="refresh-btn" onclick="doRefresh()">
      <span id="refresh-icon">↻</span> 새로고침
    </button>
  </div>
</div>

<div class="main">

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">총 조회수</div><div class="kpi-val" id="kpi-views">—</div></div>
    <div class="kpi"><div class="kpi-label">총 영상수</div><div class="kpi-val" id="kpi-count">—</div></div>
    <div class="kpi"><div class="kpi-label">편당 평균 조회수</div><div class="kpi-val" id="kpi-eff">—</div></div>
  </div>

  <div class="summary">
    <svg class="summary-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><path d="M10 6v4l2.5 2.5"/></svg>
    <div class="summary-content">
      <div class="summary-label">AI 요약</div>
      <div class="summary-text" id="summary-text">새로고침을 눌러 데이터를 불러오세요.</div>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab active" onclick="switchTab('ranking')">브랜드 랭킹</button>
    <button class="tab" onclick="switchTab('country')">국가 집중도</button>
    <button class="tab" onclick="switchTab('trend')">트렌드</button>
  </div>

  <div id="tab-ranking">
    <div class="chart-row">
      <div class="card">
        <div class="card-title">조회수 랭킹</div>
        <div id="bar-views"></div>
      </div>
      <div class="card">
        <div class="card-title">영상수 랭킹</div>
        <div id="bar-counts"></div>
      </div>
    </div>
  </div>

  <div id="tab-country" style="display:none">
    <div class="card">
      <div class="country-header">
        <div class="country-title"><span id="country-brand-label">전체 브랜드</span>의 국가별 집중도</div>
      </div>
      <div class="signals" id="signals"></div>
      <div class="country-grid" id="country-grid"></div>
    </div>
  </div>

  <div id="tab-trend" style="display:none">
    <div class="card">
      <div class="card-title">날짜별 조회수 추이</div>
      <div class="trend-wrap"><canvas id="trend-chart" role="img" aria-label="날짜별 조회수 추이"></canvas></div>
    </div>
  </div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyrxVGrcKyFS1nKJr9ASZrzsP2XyeEnfXk6Uxr_vBCmqELC2jPP_WPkH69b_8kmPPuY/exec';
const COUNTRY_NAMES = {US:'미국',GB:'영국',DE:'독일',FR:'프랑스',JP:'일본',KR:'한국',CA:'캐나다',AU:'호주',ID:'인도네시아',PH:'필리핀',MY:'말레이시아',TH:'태국',VN:'베트남',MX:'멕시코',BR:'브라질',ES:'스페인',IT:'이탈리아',PL:'폴란드',NG:'나이지리아',DO:'도미니카',AE:'UAE',SG:'싱가포르',NL:'네덜란드',SE:'스웨덴',NO:'노르웨이',DK:'덴마크',BE:'벨기에',AT:'오스트리아',CH:'스위스',BY:'벨라루스',TR:'터키',SA:'사우디',EG:'이집트',ZA:'남아공',AR:'아르헨티나',CL:'칠레',CO:'콜롬비아',PE:'페루',EC:'에콰도르',PA:'파나마',KW:'쿠웨이트',UA:'우크라이나',RO:'루마니아',CZ:'체코',HU:'헝가리',GR:'그리스',PT:'포르투갈',IE:'아일랜드',FI:'핀란드',RS:'세르비아',TZ:'탄자니아',UG:'우간다',TJ:'타지키스탄',MM:'미얀마',KH:'캄보디아',LA:'라오스',BD:'방글라데시',NP:'네팔',PK:'파키스탄',KZ:'카자흐스탄',MD:'몰도바',SN:'세네갈',CD:'콩고',CI:'코트디부아르',MA:'모로코',GE:'조지아',IL:'이스라엘',JM:'자메이카',AO:'앙골라',BJ:'베냉',GH:'가나',KE:'케냐',MW:'말라위',SO:'소말리아',BH:'바레인',TT:'트리니다드',DZ:'알제리',CY:'키프로스',VE:'베네수엘라',HN:'온두라스',CR:'코스타리카'};
const COLORS = ['#2F6EE8','#3CA0A0','#9B7FD4','#E17A4F','#7CB87C','#D4A44F','#D45F8A','#5FA8D4','#A4C254','#E14F4F','#7FBCCC','#B47FD4','#D4854F','#4FB47F','#8A7FD4'];

var allData = [];
var trendChart = null;

function fmt(n) {
  if (n >= 1000000) return (Math.round(n / 100000) / 10) + 'M';
  if (n >= 1000) return (Math.round(n / 100) / 10) + 'K';
  return String(Math.round(n));
}

function loadData() {
  return fetch(API_URL)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      allData = json.map(function(row) {
        var dateVal = row['upload_date'];
        if (typeof dateVal === 'number') {
          var d = new Date(Math.round((dateVal - 25569) * 86400 * 1000));
          dateVal = d.toISOString().slice(0, 10);
        } else {
          dateVal = String(dateVal).trim();
        }
        return {
          date: dateVal,
          keyword: String(row['keyword'] || '').trim(),
          country: String(row['country'] || '').trim(),
          count: parseInt(row['count']) || 0,
          views: parseInt(row['sum_views']) || 0
        };
      }).filter(function(d) { return d.date && d.keyword; });
    });
}

function getFiltered() {
  var brand = document.getElementById('brand-sel').value;
  var dateVal = document.getElementById('date-sel').value;
  var d = allData;
  if (brand !== 'ALL') d = d.filter(function(r) { return r.keyword === brand; });
  if (dateVal !== 'ALL') d = d.filter(function(r) { return r.date === dateVal; });
  return d;
}

function getBrandMap(data) {
  var map = {};
  data.forEach(function(r) {
    if (!map[r.keyword]) map[r.keyword] = { keyword: r.keyword, views: 0, count: 0 };
    map[r.keyword].views += r.views;
    map[r.keyword].count += r.count;
  });
  return Object.values(map).sort(function(a, b) { return b.views - a.views; });
}

function renderKPI(data) {
  var totV = data.reduce(function(s, r) { return s + r.views; }, 0);
  var totC = data.reduce(function(s, r) { return s + r.count; }, 0);
  document.getElementById('kpi-views').textContent = fmt(totV);
  document.getElementById('kpi-count').textContent = totC.toLocaleString();
  document.getElementById('kpi-eff').textContent = totC > 0 ? fmt(Math.round(totV / totC)) : '—';
}

function renderBars(data) {
  var brands = getBrandMap(data).slice(0, 12);
  var maxV = brands[0] ? brands[0].views : 1;
  var sortedC = brands.slice().sort(function(a, b) { return b.count - a.count; });
  var maxC = sortedC[0] ? sortedC[0].count : 1;
  var vHtml = '', cHtml = '';
  brands.forEach(function(b, i) {
    var vPct = Math.round(b.views / maxV * 100);
    var cPct = Math.round(b.count / maxC * 100);
    var c = COLORS[i % COLORS.length];
    var rank = i + 1;
    vHtml += '<div class="brand-row" onclick="selectBrand(\'' + b.keyword + '\')">'
      + '<span class="brank">' + rank + '</span>'
      + '<span class="bname">' + b.keyword + '</span>'
      + '<div class="bar-track"><div class="bar-fill" style="width:' + vPct + '%;background:' + c + '"></div></div>'
      + '<span class="bval">' + fmt(b.views) + '</span></div>';
    cHtml += '<div class="brand-row" onclick="selectBrand(\'' + b.keyword + '\')">'
      + '<span class="brank">' + rank + '</span>'
      + '<span class="bname">' + b.keyword + '</span>'
      + '<div class="bar-track"><div class="bar-fill" style="width:' + cPct + '%;background:' + c + '"></div></div>'
      + '<span class="bval">' + b.count + '</span></div>';
  });
  document.getElementById('bar-views').innerHTML = vHtml;
  document.getElementById('bar-counts').innerHTML = cHtml;
}

function renderCountry(data) {
  var brand = document.getElementById('brand-sel').value;
  document.getElementById('country-brand-label').textContent = brand === 'ALL' ? '전체 브랜드' : brand;
  var map = {};
  data.forEach(function(r) {
    if (!map[r.country]) map[r.country] = { country: r.country, views: 0, count: 0 };
    map[r.country].views += r.views;
    map[r.country].count += r.count;
  });
  var countries = Object.values(map).sort(function(a, b) { return b.views - a.views; }).slice(0, 18);
  var maxV = countries[0] ? countries[0].views : 1;
  var html = '';
  countries.forEach(function(c) {
    var eff = c.count > 0 ? Math.round(c.views / c.count) : 0;
    var pct = Math.round(c.views / maxV * 100);
    var badgeClass = 'badge-low', badgeLabel = '보통';
    if (eff > 5000) { badgeClass = 'badge-high'; badgeLabel = '고효율'; }
    else if (eff > 1000) { badgeClass = 'badge-mid'; badgeLabel = '중효율'; }
    var cname = COUNTRY_NAMES[c.country] || c.country;
    html += '<div class="ccard">'
      + '<div class="ccard-name">' + cname + ' <span style="font-weight:400;color:var(--text-hint);font-size:10px">' + c.country + '</span></div>'
      + '<div class="ccard-views">' + fmt(c.views) + '</div>'
      + '<div class="ccard-meta">영상 ' + c.count + '개 · 편당 ' + fmt(eff) + '</div>'
      + '<span class="badge ' + badgeClass + '">' + badgeLabel + '</span>'
      + '<div class="bar-mini"><div class="bar-mini-fill" style="width:' + pct + '%"></div></div>'
      + '</div>';
  });
  document.getElementById('country-grid').innerHTML = html || '<span style="font-size:13px;color:var(--text-muted)">데이터 없음</span>';
  var top3 = countries.slice(0, 3).map(function(c) { return COUNTRY_NAMES[c.country] || c.country; });
  document.getElementById('signals').innerHTML = top3.map(function(n) {
    return '<span class="signal">🔥 ' + n + ' 집중</span>';
  }).join('');
}

function renderTrend(data) {
  var dateMap = {};
  data.forEach(function(r) {
    if (!dateMap[r.date]) dateMap[r.date] = 0;
    dateMap[r.date] += r.views;
  });
  var dates = Object.keys(dateMap).sort();
  var vals = dates.map(function(d) { return dateMap[d]; });
  if (trendChart) trendChart.destroy();
  var ctx = document.getElementById('trend-chart').getContext('2d');
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [{
        label: '총 조회수',
        data: vals,
        borderColor: '#2F6EE8',
        backgroundColor: 'rgba(47,110,232,0.06)',
        tension: .3,
        fill: true,
        pointRadius: 5,
        pointBackgroundColor: '#2F6EE8',
        pointBorderColor: '#fff',
        pointBorderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(ctx) { return '조회수: ' + fmt(ctx.parsed.y); } } }
      },
      scales: {
        y: { ticks: { callback: function(v) { return fmt(v); }, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.04)' } },
        x: { ticks: { font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

function renderSummary(data) {
  var brands = getBrandMap(data);
  if (!brands.length) { document.getElementById('summary-text').textContent = '데이터 없음'; return; }
  var top = brands[0];
  var cmap = {};
  data.filter(function(r) { return r.keyword === top.keyword; }).forEach(function(r) {
    if (!cmap[r.country]) cmap[r.country] = 0;
    cmap[r.country] += r.views;
  });
  var topC = Object.entries(cmap).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 2).map(function(e) { return COUNTRY_NAMES[e[0]] || e[0]; });
  var outlier = data.reduce(function(mx, r) { return r.views > mx.views ? r : mx; }, { views: 0, keyword: '', country: '' });
  var dateVal = document.getElementById('date-sel').value;
  var period = dateVal === 'ALL' ? '전체 기간' : dateVal;
  document.getElementById('summary-text').textContent =
    period + ' 기준 — 조회수 1위: ' + top.keyword + ' (' + fmt(top.views) + '). 주요 집중 국가: ' + topC.join(', ') + '. 단일 최고 조회수: ' + outlier.keyword + ' ' + (COUNTRY_NAMES[outlier.country] || outlier.country) + ' ' + fmt(outlier.views) + '뷰.';
}

function populateFilters() {
  var brandSet = {}, dateSet = {};
  allData.forEach(function(d) { brandSet[d.keyword] = 1; dateSet[d.date] = 1; });
  var brands = Object.keys(brandSet).sort();
  var dates = Object.keys(dateSet).sort().reverse();
  var bSel = document.getElementById('brand-sel');
  var dSel = document.getElementById('date-sel');
  bSel.innerHTML = '<option value="ALL">전체 브랜드</option>' + brands.map(function(b) { return '<option value="' + b + '">' + b + '</option>'; }).join('');
  dSel.innerHTML = '<option value="ALL">전체 날짜</option>' + dates.map(function(d) { return '<option value="' + d + '">' + d + '</option>'; }).join('');
  if (dates[0]) dSel.value = dates[0];
}

function render() {
  var filtered = getFiltered();
  renderKPI(filtered);
  renderBars(filtered);
  renderCountry(filtered);
  renderSummary(filtered);
  if (document.getElementById('tab-trend').style.display !== 'none') renderTrend(filtered);
}

function selectBrand(b) {
  document.getElementById('brand-sel').value = b;
  switchTab('country');
  render();
}

function switchTab(name) {
  var names = ['ranking', 'country', 'trend'];
  document.querySelectorAll('.tab').forEach(function(t, i) { t.classList.toggle('active', names[i] === name); });
  document.getElementById('tab-ranking').style.display = name === 'ranking' ? 'block' : 'none';
  document.getElementById('tab-country').style.display = name === 'country' ? 'block' : 'none';
  document.getElementById('tab-trend').style.display = name === 'trend' ? 'block' : 'none';
  if (name === 'trend') renderTrend(getFiltered());
}

document.getElementById('brand-sel').onchange = render;
document.getElementById('date-sel').onchange = render;

function doRefresh() {
  var btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 로딩 중...';
  loadData().then(function() {
    populateFilters();
    render();
    document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
  }).catch(function(e) {
    document.getElementById('summary-text').textContent = '로드 실패: ' + e.message;
  }).finally(function() {
    btn.disabled = false;
    btn.innerHTML = '↻ 새로고침';
  });
}

doRefresh();
</script>
</body>
</html>
